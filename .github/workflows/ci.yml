name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest flake8 bandit pip-audit detect-secrets

      - name: Test
        run: pytest tests/ -v

      - name: Lint
        run: flake8 src/ tests/

      - name: Security scan 
        run: bandit -r src/

      - name: Dependency scan
        run: pip-audit

      - name: Secrets scan
        run: detect-secrets scan